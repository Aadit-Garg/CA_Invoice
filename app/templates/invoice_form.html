{% extends "base.html" %}
{% block title %}Create Invoice — CA Invoice{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h3 class="fw-bold mb-0">Create Invoice</h3>
        <p class="text-muted small mb-0">Generate a new professional invoice</p>
    </div>
    <a href="{{ url_for('main.invoices') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Back
    </a>
</div>

<form method="POST" class="ca-card border-0 shadow-sm bg-white p-4">
    <!-- Header info -->
    <div class="row g-4 mb-4">
        <div class="col-md-6">
            <label class="form-label fw-semibold">Select Client *</label>
            <select name="client_id" class="form-select bg-light" required>
                <option value="">-- Choose Client --</option>
                {% for client in clients %}
                <option value="{{ client['id'] }}">{{ client['name'] }} (GSTIN: {{ client.get('gstin') or 'N/A' }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-6">
            <label class="form-label fw-semibold">Invoice Number *</label>
            <input type="text" name="invoice_number" class="form-control bg-light" value="{{ next_num }}" required>
        </div>
        <div class="col-md-4">
            <label class="form-label fw-semibold">Issue Date *</label>
            <input type="date" name="issue_date" class="form-control bg-light" value="{{ today }}" required>
        </div>
        <div class="col-md-4">
            <label class="form-label fw-semibold">Due Date</label>
            <input type="date" name="due_date" class="form-control bg-light">
        </div>
        <div class="col-md-4">
            <label class="form-label fw-semibold">Tax Type *</label>
            <select name="tax_type" class="form-select bg-light" required>
                <option value="IGST">IGST (Inter-state)</option>
                <option value="CGST_SGST">CGST & SGST (Intra-state)</option>
            </select>
        </div>
    </div>

    <!-- Line Items -->
    <h5 class="fw-bold mt-5 mb-3 border-bottom pb-2">Line Items</h5>
    <div class="table-responsive">
        <table class="table table-bordered align-middle" id="itemsTable">
            <thead class="table-light">
                <tr>
                    <th style="width: 50%;">Service Description *</th>
                    <th style="width: 20%;">SAC Code</th>
                    <th style="width: 20%;">Amount (₹) *</th>
                    <th style="width: 10%; text-align: center;">Action</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input type="text" name="description[]" class="form-control" required placeholder="e.g. Professional Fees for Audit"></td>
                    <td><input type="text" name="sac_code[]" class="form-control" placeholder="e.g. 998221"></td>
                    <td><input type="number" step="0.01" name="amount[]" class="form-control text-end item-amount" required value="0.00"></td>
                    <td class="text-center">
                        <button type="button" class="btn btn-sm btn-outline-danger remove-item"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="4">
                        <button type="button" class="btn btn-sm btn-outline-primary" id="addItemBtn">
                            <i class="bi bi-plus-circle me-1"></i>Add Another Line Item
                        </button>
                    </td>
                </tr>
            </tfoot>
        </table>
    </div>

    <div class="row mt-4">
        <div class="col-md-6">
            <label class="form-label fw-semibold">Terms & Notes</label>
            <textarea name="notes" rows="4" class="form-control bg-light">{{ setting.default_notes if setting else '' }}</textarea>
        </div>
        <div class="col-md-6 text-end">
            <button type="submit" class="btn btn-primary px-5 py-2 mt-4 fw-semibold shadow-sm">
                <i class="bi bi-check2-circle me-2"></i>Create Invoice
            </button>
        </div>
    </div>
</form>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const table = document.getElementById('itemsTable').getElementsByTagName('tbody')[0];
    const addBtn = document.getElementById('addItemBtn');

    addBtn.addEventListener('click', function() {
        const row = table.insertRow();
        row.innerHTML = `
            <td><input type="text" name="description[]" class="form-control" required></td>
            <td><input type="text" name="sac_code[]" class="form-control"></td>
            <td><input type="number" step="0.01" name="amount[]" class="form-control text-end item-amount" required value="0.00"></td>
            <td class="text-center">
                <button type="button" class="btn btn-sm btn-outline-danger remove-item"><i class="bi bi-trash"></i></button>
            </td>
        `;
    });

    table.addEventListener('click', function(e) {
        if (e.target.closest('.remove-item')) {
            if (table.rows.length > 1) {
                e.target.closest('tr').remove();
            } else {
                alert("You must have at least one line item.");
            }
        }
    });
});
</script>
{% endblock %}
