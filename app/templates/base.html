<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ session.get('firm_name', 'Sumit N Garg & Associates') }} — Invoicing{% endblock %}</title>

    <link rel="icon" type="image/png" href="{{ session.get('logo_url') or url_for('static', filename='img/logo.png') }}">
    <meta name="theme-color" content="#1a365d">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
</head>
<body>
    <!-- CSS Grid Layout -->
    <div class="ca-desktop-grid">
        
        <!-- Fixed Sidebar -->
        <aside class="ca-sidebar">
            {% include '_sidebar.html' %}
        </aside>

        <!-- Fixed Header -->
        <header class="ca-header">
            {% include '_navbar.html' %}
        </header>

        <!-- Scrollable Main Content -->
        <main class="ca-main">
            <div class="container-fluid p-0">
                <div class="desktop-content" id="main-content-container">
                    {% with messages = get_flashed_messages(with_categories=true) %}
                      {% if messages %}
                        <div class="mb-4">
                        {% for category, message in messages %}
                          <div class="alert alert-{{ category if category != 'error' else 'danger' }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                          </div>
                        {% endfor %}
                        </div>
                      {% endif %}
                    {% endwith %}

                    {% block content %}{% endblock %}
                </div>
            </div>
        </main>
    </div>
    
    <!-- Mobile Sidebar Overlay -->
    <div id="sidebar-overlay" class="ca-overlay" onclick="document.querySelector('.ca-sidebar').classList.remove('show'); this.classList.remove('show');"></div>
</body>
</html>
